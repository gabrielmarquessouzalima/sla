<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Primeira Página</title>
    <style>
        body {
            /* O degradê começa no azul e termina em um roxo bem escuro (#2e004d) */
            background: linear-gradient(to bottom, rgb(0, 16, 135), #2e004d);
            
            /* Isso garante que o fundo cubra a tela toda mesmo se você rolar a página */
            background-attachment: fixed; 
            
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: sans-serif;
            color: white; /* Cor branca para o nome Gabriel aparecer melhor no fundo escuro */
        }

        .meu-gif {
            width: 300px;
            height: auto;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        h1 {
            margin: 5px 0;
        }

        .texto-vermelho {
            color: red;
            font-size: 50px;
            margin: 10px 0;
            text-transform: uppercase;
            /* Adicionei uma sombra para o texto vermelho não "sumir" no azul/roxo */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <h1>Gabriel</h1>
    <h1 class="texto-vermelho">hello world!</h1>

    <img src="https://media1.tenor.com/m/h1avbRkVQFIAAAAC/butcher-vanity-vane-lily.gif" 
         alt="Butcher Vanity" 
         class="meu-gif">

</body>
</html>

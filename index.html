<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Primeira Página</title>
    <style>
        body {
            background-color: yellow;
            margin: 0;
            display: flex;
            flex-direction: column; /* Coloca os itens um embaixo do outro */
            align-items: center;    /* Centraliza horizontalmente */
            justify-content: center; /* Centraliza verticalmente na tela */
            min-height: 100vh;      /* Garante que o corpo ocupe a altura toda */
            font-family: sans-serif;
        }

        .meu-gif {
            width: 250px; /* Aqui você controla o tamanho do GIF */
            height: auto;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h1 {
            margin: 5px 0;
        }
    </style>
</head>
<body>

<style>
    /* ... seus outros estilos ... */
    
    .texto-vermelho {
        color: red;
        font-size: 60px; /* Aqui você controla o "gigantismo" do texto */
        margin: 10px 0;
        text-transform: uppercase; /* Opcional: deixa tudo em MAIÚSCULO */
    }
</style>

<body>
    <h1>Gabriel</h1>
    <h1 class="texto-vermelho">hello world!</h1>
    
    </body>
</style>

</body>
</html>

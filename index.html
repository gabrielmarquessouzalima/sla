<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>GIF Centralizado</title>
    <style>
        /* Estilo para ocupar a tela toda e centralizar o conteúdo */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center; /* Centraliza horizontalmente */
            align-items: center;     /* Centraliza verticalmente */
            background-color: #1a1a1a; /* Cor de fundo opcional */
        }

        .container {
            text-align: center;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px; /* Bordas levemente arredondadas */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); /* Sombra para destaque */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://media.tenor.com/79_u9_0O-XgAAAAC/butcher-vanity-vane-lily-synthv.gif" alt="Butcher Vanity Vane Lily">
    </div>

</body>
</html>

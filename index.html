<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espaço do Gabriel</title>
    <style>
        /* --- ESTILOS GERAIS E FUNDO --- */
        body {
            background: 
                radial-gradient(1px 1px at 20px 30px, white, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, white, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, white, rgba(0,0,0,0)),
                linear-gradient(to bottom, rgb(0, 10, 80), #1a002e);
            background-size: 200px 200px, 200px 200px, 200px 200px, 100% 100%;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: sans-serif;
            color: white;
            overflow: hidden; 
            position: relative;
        }

        /* --- TELA DE ENTRADA --- */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }

        #btn-entrar {
            padding: 15px 30px;
            font-size: 20px;
            background: transparent;
            color: white;
            border: 2px solid white;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            border-radius: 5px;
        }

        /* --- GRAMA (O CORAÇÃO DO EFEITO) --- */
        .grama {
            position: fixed;
            bottom: -60px; /* Esconde a base para parecer que brota do chão */
            width: 60%; /* Largura generosa para cobrir os cantos */
            height: 500px; /* Altura para dar profundidade */
            background-image: url('https://www.transparentpng.com/download/grass/S9S8sL-grass-silhouette-png-file.png');
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 99; /* Garante que fique na frente de tudo */
            filter: brightness(0.05) blur(1.5px); /* Efeito de silhueta e desfoque de proximidade */
            pointer-events: none; /* Não atrapalha cliques na tela */
        }

        .grama-esq {
            left: -15%;
            transform-origin: bottom left;
            animation: balanco-esq 8s ease-in-out infinite;
        }

        .grama-dir {
            right: -15%;
            transform-origin: bottom right;
            animation: balanco-dir 9s ease-in-out infinite;
        }

        /* Animação de brisa suave */
        @keyframes balanco-esq {
            0%, 100% { transform: rotate(10deg); }
            50% { transform: rotate(14deg) scale(1.02); }
        }

        @keyframes balanco-dir {
            0%, 100% { transform: rotate(-10deg) scaleX(-1); }
            50% { transform: rotate(-14deg) scaleX(-1.02); }
        }

        /* --- OUTROS ELEMENTOS --- */
        #chuva {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .lua {
            position: absolute;
            top: 5%; 
            right: 17%;
            width: 100px;
            height: 100px;
            box-shadow: 25px 10px 0 0 rgba(255, 255, 230, 0.9);
            border-radius: 50%;
            z-index: 1;
            transform: rotate(15deg);
        }

        .rayquaza-fundo {
            position: absolute;
            top: 8%;
            right: 18%;
            width: 70px;
            opacity: 0.6;
            z-index: 2;
            animation: flutuar 4s ease-in-out infinite;
        }

        @keyframes flutuar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .mimikyu-topo { width: 80px; margin-left: 120px; margin-bottom: -25px; z-index: 5; }
        .meu-gif { width: 300px; border-radius: 10px; z-index: 5; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .texto-vermelho { color: #ff3333; font-size: 50px; text-shadow: 0 0 15px red; }
        
        iframe { display: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="btn-entrar">ENTRAR NO ESPAÇO</button>
    </div>

    <div class="grama grama-esq"></div>
    <div class="grama grama-dir"></div>

    <canvas id="chuva"></canvas>
    <div id="player-container"></div>
    <div class="lua"></div>

    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/384.gif" class="rayquaza-fundo">

    <h1>Gabriel</h1>
    <img src="https://media.tenor.com/dBsHOlc6L30AAAAj/mimikyu.gif" class="mimikyu-topo">
    <h1 class="texto-vermelho">hello world!</h1>
    <img src="https://media1.tenor.com/m/h1avbRkVQFIAAAAC/butcher-vanity-vane-lily.gif" class="meu-gif">

    <script>
        const overlay = document.getElementById('overlay');
        const btn = document.getElementById('btn-entrar');
        const playerContainer = document.getElementById('player-container');
        const canvas = document.getElementById('chuva');
        const ctx = canvas.getContext('2d');

        let gotas = [];
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        for (let i = 0; i < 120; i++) {
            gotas.push({
                x: Math.random() * canvas.width - canvas.width / 2,
                y: Math.random() * canvas.height - canvas.height / 2,
                z: Math.random() * 1000,
                velocidade: 18
            });
        }

        function animarChuva() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centroX = canvas.width / 2;
            const centroY = canvas.height / 2;
            gotas.forEach(g => {
                g.z -= g.velocidade;
                if (g.z <= 0) g.z = 1000;
                const escala = 400 / (400 + g.z);
                const x2d = g.x * escala + centroX;
                const y2d = g.y * escala + centroY;
                ctx.beginPath();
                ctx.strokeStyle = `rgba(180, 200, 255, ${(1 - g.z/1000) * 0.6})`;
                ctx.lineWidth = escala * 3;
                ctx.moveTo(x2d, y2d);
                ctx.lineTo(x2d + (g.x * escala * 0.05), y2d + (g.y * escala * 0.05));
                ctx.stroke();
            });
            requestAnimationFrame(animarChuva);
        }

        btn.addEventListener('click', () => {
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                animarChuva();
            }, 1000);

            playerContainer.innerHTML = `<iframe src="https://www.youtube.com/embed/iymkhH754bo?autoplay=1&loop=1&playlist=iymkhH754bo" allow="autoplay"></iframe>`;
        });
    </script>
</body>
</html>

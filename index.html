<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espaço do Gabriel</title>
    <style>
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: black;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100;
            transition: opacity 1s ease;
        }

        #btn-entrar {
            padding: 15px 30px;
            font-size: 20px;
            background: transparent;
            color: white;
            border: 2px solid white;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            border-radius: 5px;
        }

        #btn-entrar:hover { background: white; color: black; }

        body {
            /* Fundo azul bem escuro (o céu que aparece nos espaços) */
            background-color: #020410;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: sans-serif;
            color: white;
            overflow: hidden; 
            position: relative;
        }

        /* Camada das Nuvens Paradas */
        .nuvens-estaticas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Criando várias manchas de nuvens com transparência */
            background: 
                radial-gradient(circle at 10% 10%, rgba(60, 70, 90, 0.6) 0%, transparent 50%),
                radial-gradient(circle at 90% 20%, rgba(50, 60, 80, 0.7) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(40, 50, 70, 0.5) 0%, transparent 60%),
                radial-gradient(circle at 20% 80%, rgba(60, 70, 90, 0.6) 0%, transparent 50%),
                radial-gradient(circle at 85% 85%, rgba(50, 60, 80, 0.7) 0%, transparent 40%);
            z-index: -1;
        }

        #cenario-chuva {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .rayquaza-fundo {
            position: absolute;
            top: 8%; right: 18%;
            width: 70px;
            opacity: 0.3;
            z-index: 1;
            filter: blur(1.5px);
        }

        .mimikyu-topo {
            width: 80px; 
            margin-left: 120px; 
            margin-bottom: -25px; 
            z-index: 5;
        }

        .meu-gif {
            width: 300px;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            z-index: 5;
        }

        h1 { margin: 5px 0; z-index: 5; text-shadow: 2px 2px 10px black; }
        .texto-vermelho {
            color: #ff3333;
            font-size: 50px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
        }

        iframe { display: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="btn-entrar">ENTRAR NO ESPAÇO</button>
    </div>

    <div class="nuvens-estaticas"></div>

    <canvas id="cenario-chuva"></canvas>

    <div id="player-container"></div>

    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/384.gif" alt="Rayquaza" class="rayquaza-fundo">
    <h1>Gabriel</h1>
    <img src="https://media.tenor.com/dBsHOlc6L30AAAAj/mimikyu.gif" alt="Mimikyu" class="mimikyu-topo">
    <h1 class="texto-vermelho">hello world!</h1>
    <img src="https://media1.tenor.com/m/h1avbRkVQFIAAAAC/butcher-vanity-vane-lily.gif" alt="Butcher Vanity" class="meu-gif">

    <script>
        const canvas = document.getElementById('cenario-chuva');
        const ctx = canvas.getContext('2d');
        let largura, altura;
        let gotas = [];

        function resize() {
            largura = canvas.width = window.innerWidth;
            altura = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function criarGota() {
            return {
                x: Math.random() * largura - largura / 2,
                y: Math.random() * altura - altura / 2,
                z: Math.random() * 1000,
                v: 22 // Velocidade da chuva
            };
        }

        for (let i = 0; i < 180; i++) gotas.push(criarGota());

        function animar() {
            ctx.clearRect(0, 0, largura, altura);

            const cx = largura / 2;
            const cy = altura / 2;

            gotas.forEach(g => {
                g.z -= g.v;
                if (g.z <= 0) g.z = 1000;

                const escala = 400 / (400 + g.z);
                const x2d = g.x * escala + cx;
                const y2d = g.y * escala + cy;
                const o = (1 - g.z / 1000) * 0.6;

                ctx.strokeStyle = `rgba(180, 210, 255, ${o})`;
                ctx.lineWidth = escala * 4;
                ctx.beginPath();
                ctx.moveTo(x2d, y2d);
                ctx.lineTo(x2d + (g.x * escala * 0.08), y2d + (g.y * escala * 0.08));
                ctx.stroke();
            });

            requestAnimationFrame(animar);
        }

        document.getElementById('btn-entrar').addEventListener('click', () => {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                animar();
            }, 1000);

            document.getElementById('player-container').innerHTML = `
                <iframe src="https://www.youtube.com/embed/iymkhH754bo?autoplay=1&loop=1&playlist=iymkhH754bo" allow="autoplay"></iframe>`;
        });
    </script>
</body>
</html>
